[Overrides]
; Path to the 'Mods' folder
; Default: <dll_directory>/Mods
ModsFolderPath =

; Keep empty so the root Mods/mods.txt controls ScumNeDjinBridge and SCUMTraderManager.
ControllingModsTxt =

[General]
EnableHotReloadSystem = 0
HotReloadKey = R
UseCache = 1
InvalidateCacheIfDLLDiffers = 1
SecondsToScanBeforeGivingUp = 30

; From the reference project: avoids maintaining a large UObject listener cache on SCUM servers.
bUseUObjectArrayCache = false
DoEarlyScan = 0
bEnableSeachByMemoryAddress = false
DefaultExecuteInGameThreadMethod = EngineTick
DefaultFNameToStringMethod = Scan

[EngineVersionOverride]
; SCUM dedicated server is UE 4.27.x. Explicit override avoids slow/fragile auto-detection.
MajorVersion = 4
MinorVersion = 27
DebugBuild =

[ObjectDumper]
LoadAllAssetsBeforeDumpingObjects = 0
UseModuleOffsets = 0

[CXXHeaderGenerator]
DumpOffsetsAndSizes = 0
KeepMemoryLayout = 0
LoadAllAssetsBeforeGeneratingCXXHeaders = 0

[UHTHeaderGenerator]
IgnoreAllCoreEngineModules = 0
IgnoreEngineAndCoreUObject = 1
MakeAllFunctionsBlueprintCallable = 1
MakeAllPropertyBlueprintsReadWrite = 1
MakeEnumClassesBlueprintType = 1
MakeAllConfigsEngineConfig = 1

[Debug]
ConsoleEnabled = 0
GuiConsoleEnabled = 0
GuiConsoleVisible = 0
GuiConsoleFontScaling = 1
GraphicsAPI = opengl
RenderMode = ExternalThread
LiveViewObjectsPerGroup = 32768

[Threads]
SigScannerNumThreads = 8
SigScannerMultithreadingModuleSizeThreshold = 16777216

[Memory]
MaxMemoryUsageDuringAssetLoading = 80

[Hooks]
; Unlike the reference RCON-only project, ScumNeDjinBridge needs Lua/RegisterHook/admin-command routing.
; Tick, viewport, UObjectProcessEvent, console exec and struct-link hooks remain disabled to reduce server frame spikes.
HookProcessInternal                  = 1
HookProcessLocalScriptFunction       = 1
HookInitGameState                    = 0
HookLoadMap                          = 1
HookCallFunctionByNameWithArguments  = 1
HookBeginPlay                        = 1
HookEndPlay                          = 0
HookLocalPlayerExec                  = 1
HookAActorTick                       = 0
HookEngineTick                       = 1
EngineTickResolveMethod              = Scan
HookGameViewportClientTick           = 0
HookUObjectProcessEvent              = 0
HookProcessConsoleExec               = 0
HookUStructLink                      = 0
FExecVTableOffsetInLocalPlayer       = 0x28

[CrashDump]
EnableDumping = 1
FullMemoryDump = 0

[ExperimentalFeatures]
GUIUFunctionCaller = 0
